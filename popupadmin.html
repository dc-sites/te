<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Popup Ad Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 20px;
      color: #333;
    }
    .container { max-width: 900px; margin: auto; }
    h1 { margin-bottom: 24px; text-align: center; }
    
    /* Form */
    .form-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; }
    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover { background: #0056b3; }
    
    /* Ads List */
    .ad-item {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      gap: 16px;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .ad-item img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      background: #eee;
    }
    .ad-info { flex: 1; }
    .ad-stats {
      font-size: 13px;
      color: #666;
      margin: 4px 0;
    }
    .ad-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 100px;
    }
    .btn-pause { background: #ffc107; color: #000; }
    .btn-resume { background: #28a745; }
    .btn-delete { background: #dc3545; }
    
    @media (max-width: 600px) {
      .ad-item { flex-direction: column; align-items: flex-start; }
      .ad-actions { flex-direction: row; width: 100%; }
      .ad-actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Popup Ad Manager</h1>
    
    <!-- Add New Ad Form -->
    <div class="form-card">
      <h3 style="margin-bottom:16px;">Add New Ad</h3>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" id="imageUrl" placeholder="https://example.com/ad.jpg" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="description" rows="2" placeholder="Short ad description..." required></textarea>
      </div>
      <div class="form-group">
        <label>Button Text</label>
        <input type="text" id="buttonText" placeholder="Learn More" required>
      </div>
      <div class="form-group">
        <label>Button URL</label>
        <input type="url" id="buttonUrl" placeholder="https://yoursite.com" required>
      </div>
      <button id="addAdBtn">➕ Add Ad</button>
    </div>

    <!-- Ads List -->
    <div id="adsList"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAUlaYW7amE3tl7klCZ0WbVUfmTgOn0NSM",
      authDomain: "pop-up-2545a.firebaseapp.com",
      projectId: "pop-up-2545a",
      storageBucket: "pop-up-2545a.firebasestorage.app",
      messagingSenderId: "77878116792",
      appId: "1:77878116792:web:25c2da56b15d023cddcf4d",
      measurementId: "G-XZS0186BCP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Add New Ad
    document.getElementById('addAdBtn').addEventListener('click', async () => {
      const imageUrl = document.getElementById('imageUrl').value;
      const description = document.getElementById('description').value;
      const buttonText = document.getElementById('buttonText').value;
      const buttonUrl = document.getElementById('buttonUrl').value;

      if (!imageUrl || !description || !buttonText || !buttonUrl) {
        alert('Please fill all fields');
        return;
      }

      await addDoc(collection(db, 'ads'), {
        imageUrl,
        description,
        buttonText,
        buttonUrl,
        views: 0,
        clicks: 0,
        paused: false,
        createdAt: new Date().toISOString()
      });

      // Reset form & reload
      document.getElementById('imageUrl').value = '';
      document.getElementById('description').value = '';
      document.getElementById('buttonText').value = '';
      document.getElementById('buttonUrl').value = '';
      loadAds();
    });

    // Load & Render Ads
    async function loadAds() {
      const list = document.getElementById('adsList');
      list.innerHTML = '<p style="text-align:center;color:#666;">Loading ads...</p>';
      
      const snapshot = await getDocs(collection(db, 'ads'));
      list.innerHTML = '';
      
      if (snapshot.empty) {
        list.innerHTML = '<p style="text-align:center;color:#999;">No ads created yet.</p>';
        return;
      }

      snapshot.forEach(docSnap => {
        const ad = { id: docSnap.id, ...docSnap.data() };
        const item = document.createElement('div');
        item.className = 'ad-item';
        item.innerHTML = `
          <img src="${ad.imageUrl}" alt="Ad" onerror="this.src='https://via.placeholder.com/80x60?text=No+Image'">
          <div class="ad-info">
            <strong>${ad.buttonText}</strong>
            <p style="font-size:14px;color:#555;margin:4px 0 8px;">${ad.description}</p>
            <div class="ad-stats">
              👁️ Views: <strong>${ad.views || 0}</strong> | 
              🖱️ Clicks: <strong>${ad.clicks || 0}</strong><br>
              Status: <strong style="color:${ad.paused ? '#dc3545' : '#28a745'}">
                ${ad.paused ? '⏸️ Paused' : '✅ Active'}
              </strong>
            </div>
          </div>
          <div class="ad-actions">
            <button class="${ad.paused ? 'btn-resume' : 'btn-pause'}" data-id="${ad.id}" data-paused="${ad.paused}">
              ${ad.paused ? '▶️ Resume' : '⏸️ Pause'}
            </button>
            <button class="btn-delete" data-id="${ad.id}">🗑️ Delete</button>
          </div>
        `;
        list.appendChild(item);
      });

      // Attach event listeners
      document.querySelectorAll('.btn-pause, .btn-resume').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.dataset.id;
          const paused = e.target.dataset.paused === 'true';
          await updateDoc(doc(db, 'ads', id), { paused: !paused });
          loadAds();
        });
      });

      document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          if (confirm('Delete this ad permanently?')) {
            await deleteDoc(doc(db, 'ads', e.target.dataset.id));
            loadAds();
          }
        });
      });
    }

    // Initial load
    loadAds();
  </script>
</body>
</html>
