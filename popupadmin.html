<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Popup Ads Admin - Learny</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 { margin-bottom: 20px; color: #667eea; }
    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    textarea { min-height: 60px; resize: vertical; }
    .btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
    }
    .btn:hover { opacity: 0.95; }
    .btn-danger { background: #e74c3c; }
    .btn-warning { background: #f39c12; }
    .btn-success { background: #27ae60; }
    .ad-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .ad-card img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      background: #f0f0f0;
    }
    .ad-info { flex: 1; }
    .ad-title { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
    .ad-stats { font-size: 12px; color: #666; margin: 4px 0; }
    .ad-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-badge {
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-active { background: #d4edda; color: #155724; }
    .status-paused { background: #fff3cd; color: #856404; }
    .empty { text-align: center; color: #888; padding: 30px; }
    @media (max-width: 600px) {
      .ad-card { flex-direction: column; }
      .ad-card img { width: 100%; height: 120px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Popup Ads Manager</h1>
    
    <!-- Add New Ad Form -->
    <div style="background:#f8f9ff; padding:16px; border-radius:12px; margin-bottom:24px;">
      <h3 style="margin-bottom:12px;">➕ Add New Ad</h3>
      <div class="form-group">
        <label>Image URL *</label>
        <input type="url" id="imageUrl" placeholder="https://example.com/ad.jpg" required>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea id="description" placeholder="Short ad description..." required></textarea>
      </div>
      <div class="form-group">
        <label>Button Text *</label>
        <input type="text" id="buttonText" placeholder="Click Here" required>
      </div>
      <div class="form-group">
        <label>Button URL (optional)</label>
        <input type="url" id="buttonUrl" placeholder="https://yoursite.com">
      </div>
      <button class="btn btn-success" id="addAd">Publish Ad</button>
    </div>

    <!-- Ads List -->
    <h3 style="margin-bottom:12px;">📋 Active Ads</h3>
    <div id="adsList">Loading ads...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAUlaYW7amE3tl7klCZ0WbVUfmTgOn0NSM",
      authDomain: "pop-up-2545a.firebaseapp.com",
      projectId: "pop-up-2545a",
      storageBucket: "pop-up-2545a.firebasestorage.app",
      messagingSenderId: "77878116792",
      appId: "1:77878116792:web:25c2da56b15d023cddcf4d",
      measurementId: "G-XZS0186BCP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const adsCollection = collection(db, "ads");

    // Add New Ad
    document.getElementById('addAd').addEventListener('click', async () => {
      const imageUrl = document.getElementById('imageUrl').value.trim();
      const description = document.getElementById('description').value.trim();
      const buttonText = document.getElementById('buttonText').value.trim();
      const buttonUrl = document.getElementById('buttonUrl').value.trim();

      if (!imageUrl || !description || !buttonText) {
        alert('Please fill all required fields (*)');
        return;
      }

      try {
        await addDoc(adsCollection, {
          imageUrl,
          description,
          buttonText,
          buttonUrl: buttonUrl || '',
          isActive: true,
          views: 0,
          clicks: 0,
          createdAt: new Date()
        });
        alert('✅ Ad published successfully!');
        // Reset form
        document.getElementById('imageUrl').value = '';
        document.getElementById('description').value = '';
        document.getElementById('buttonText').value = '';
        document.getElementById('buttonUrl').value = '';
        loadAds();
      } catch (error) {
        console.error('Error adding ad:', error);
        alert('❌ Failed to publish ad');
      }
    });

    // Load & Display Ads
    async function loadAds() {
      const list = document.getElementById('adsList');
      list.innerHTML = 'Loading...';
      
      try {
        const q = query(adsCollection, orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
          list.innerHTML = '<div class="empty">No ads created yet.</div>';
          return;
        }

        let html = '';
        snapshot.forEach(docSnap => {
          const ad = { id: docSnap.id, ...docSnap.data() };
          const statusClass = ad.isActive ? 'status-active' : 'status-paused';
          const statusText = ad.isActive ? '● Active' : '● Paused';
          
          html += `
            <div class="ad-card">
              <img src="${ad.imageUrl}" onerror="this.src='https://via.placeholder.com/80x60?text=Ad'">
              <div class="ad-info">
                <div class="ad-title">${ad.description.substring(0, 50)}${ad.description.length > 50 ? '...' : ''}</div>
                <div class="ad-stats">👁 ${ad.views || 0} views | 🖱 ${ad.clicks || 0} clicks</div>
                <span class="status-badge ${statusClass}">${statusText}</span>
              </div>
              <div class="ad-actions">
                <button class="btn ${ad.isActive ? 'btn-warning' : 'btn-success'}" onclick="toggleAd('${ad.id}', ${!ad.isActive})">
                  ${ad.isActive ? '⏸ Pause' : '▶ Play'}
                </button>
                <button class="btn btn-danger" onclick="deleteAd('${ad.id}')">🗑 Delete</button>
              </div>
            </div>
          `;
        });
        list.innerHTML = html;
        
      } catch (error) {
        console.error('Error loading ads:', error);
        list.innerHTML = '<div class="empty" style="color:#e74c3c;">Error loading ads</div>';
      }
    }

    // Toggle Ad Status (Pause/Play)
    window.toggleAd = async (id, newStatus) => {
      try {
        await updateDoc(doc(db, "ads", id), { isActive: newStatus });
        loadAds();
      } catch (error) {
        alert('Failed to update ad status');
      }
    };

    // Delete Ad
    window.deleteAd = async (id) => {
      if (!confirm('Delete this ad permanently?')) return;
      try {
        await deleteDoc(doc(db, "ads", id));
        loadAds();
      } catch (error) {
        alert('Failed to delete ad');
      }
    };

    // Initial load
    loadAds();
  </script>
</body>
</html>
